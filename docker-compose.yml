services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
      args:
        # Set SEAL_EXTRA=chroma in .env when VECTOR_STORE=chroma (make up sets this automatically)
        SEAL_EXTRA: ${SEAL_EXTRA:-}
    image: seal/api:latest
    # Optional locally: copy .env.example → .env (CI creates it via scripts/ci-prepare-env.sh)
    env_file:
      - path: .env
        required: false
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - "DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/seal}"
      - "DUCKDB_PATH=${DUCKDB_PATH:-:memory:}"
      - "OLLAMA_PROFILE=${OLLAMA_PROFILE:-default}"
      - "LLM_MODEL=${LLM_MODEL:-ollama/llama3.2:1b}"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}"
      - "LLM_API_KEY=${LLM_API_KEY:-}"
      - "GEMINI_API_KEY=${GEMINI_API_KEY:-}"
      - "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
      - "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"
      - "MAX_ROWS=${MAX_ROWS:-10000}"
      - "MAX_JOINS=${MAX_JOINS:-10}"
      - "MAX_SUBQUERY_DEPTH=${MAX_SUBQUERY_DEPTH:-5}"
      - "QUERY_TIMEOUT_SECONDS=${QUERY_TIMEOUT_SECONDS:-30}"
      - "QUERY_MAX_RETRIES=${QUERY_MAX_RETRIES:-2}"
      - "QUERY_ROW_CAP=${QUERY_ROW_CAP:-10000}"
      - "QUERY_RETRY_BASE_DELAY=${QUERY_RETRY_BASE_DELAY:-0.5}"
      - "LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}"
      - 'CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}'
      # Set SEAL_API_KEY in .env (see .env.example). No insecure default in compose.
      - "SEAL_API_KEY=${SEAL_API_KEY:-}"
      - "SEAL_AUTH_REQUIRED=${SEAL_AUTH_REQUIRED:-false}"
      - "SEAL_DEV_MODE=${SEAL_DEV_MODE:-true}"
      - "SEAL_DISABLE_DOCS=${SEAL_DISABLE_DOCS:-false}"
      - "DATA_CATALOG_PATH=${DATA_CATALOG_PATH:-/app/config/catalog.yaml}"
      - "CATALOG_AUTO_SYNC=${CATALOG_AUTO_SYNC:-true}"
      - "VECTOR_STORE=${VECTOR_STORE:-none}"
      - "CHAT_ENHANCEMENT_ENABLED=${CHAT_ENHANCEMENT_ENABLED:-true}"
      - "CHROMA_PERSIST_PATH=${CHROMA_PERSIST_PATH:-/app/data/chroma}"
      - "EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}"
    volumes:
      - ./.env.example:/app/.env.example:ro
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./evals:/app/evals
      - ./sdks/python:/app/sdks/python
      - ./scripts:/app/scripts
      - ./config:/app/config
      - chroma_data:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["${OLLAMA_PROFILE:-default}"]
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - "LLM_MODEL=${LLM_MODEL:-ollama/llama3.2:1b}"
    # Dynamically pull whichever model LLM_MODEL is set to
    entrypoint: >
      /bin/sh -c "
        /bin/ollama serve &
        sleep 5 &&
        /bin/ollama pull $${LLM_MODEL#ollama/} &&
        wait
      "

volumes:
  postgres_data:
  ollama_data:
  chroma_data:

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    image: intelligence-connector/api:latest
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - "DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/intelligence_connector}"
      - "DUCKDB_PATH=${DUCKDB_PATH:-:memory:}"
      - "LLM_TYPE=${LLM_TYPE:-local}"
      - "LLM_MODEL=${LLM_MODEL:-ollama/llama3.2:1b}"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}"
      - "LLM_API_KEY=${LLM_API_KEY:-}"
      - "GEMINI_API_KEY=${GEMINI_API_KEY:-}"
      - "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
      - "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"
      - "MAX_ROWS=${MAX_ROWS:-10000}"
      - "QUERY_TIMEOUT_SECONDS=${QUERY_TIMEOUT_SECONDS:-30}"
      - 'CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./evals:/app/evals
      - ./sdks/python:/app/sdks/python
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-intelligence_connector}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["${OLLAMA_PROFILE:-default}"]
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - "LLM_MODEL=${LLM_MODEL:-ollama/llama3.2:1b}"
    # Dynamically pull whichever model LLM_MODEL is set to
    entrypoint: >
      /bin/sh -c "
        /bin/ollama serve &
        sleep 5 &&
        /bin/ollama pull $${LLM_MODEL#ollama/} &&
        wait
      "

volumes:
  postgres_data:
  ollama_data:

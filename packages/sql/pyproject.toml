[project]
name = "seal-sql"
version = "0.1.0"
description = "SQL validation and execution for Seal"
requires-python = ">=3.11"
dependencies = [
    "seal-core",
    "pydantic>=2.10.0",
    "sqlglot[rs]>=26.0.0",
    "asyncpg>=0.30.0",
    "duckdb>=1.1.0",
    "polars>=1.15.0",
]

[tool.uv.sources]
seal-core = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pandas>=2.2.0",
]

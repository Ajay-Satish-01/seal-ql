[project]
name = "intelligence-sql"
version = "0.1.0"
description = "SQL validation and execution for Intelligence Connector"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "sqlglot[rs]>=26.0.0",
    "asyncpg>=0.30.0",
    "duckdb>=1.1.0",
    "polars>=1.15.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pandas>=2.2.0",
]

[project]
name = "seal-core"
version = "0.1.0"
description = "Schema introspection and query planning for Seal"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "duckdb>=1.1.0",
    "asyncpg>=0.30.0",
    "litellm>=1.50.0",
    "instructor>=1.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
]

[project]
name = "seal-charts"
version = "0.1.0"
description = "Vega-Lite chart spec generation for Seal"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "seal-core",
    "seal-sql",
]

[tool.uv.sources]
seal-core = { workspace = true }
seal-sql = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

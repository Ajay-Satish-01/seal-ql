# Pre-commit hooks for Seal
# Install: make setup  (or: pre-commit install)
# Run manually: pre-commit run --all-files
#
# NOTE: The prettier/eslint hooks run locally via npx/pnpm.
#       Tests (unit + E2E) run in GitHub Actions and via `make check` / `make check-e2e` — not on git push.

repos:
  # ============================================================
  # Python — Ruff (formatting + linting)
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with uv.lock (make check runs `uv run ruff` in Docker).
    rev: v0.15.14
    hooks:
      - id: ruff-check
        name: "ruff lint"
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: "ruff format"
        types_or: [python, pyi]

  # ============================================================
  # General file hygiene
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: docker-compose.*\.yml$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        # Lockfiles are expected to exceed 500KB in uv workspaces.
        exclude: ^uv\.lock$
      - id: debug-statements

  # ============================================================
  # TypeScript — Prettier + ESLint (Local via pnpm/npx)
  # ============================================================
  - repo: local
    hooks:
      - id: prettier
        name: "prettier format (TS)"
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, css, json]
        files: ^sdks/typescript/
        exclude: ^sdks/typescript/src/generated/

      - id: eslint
        name: "eslint lint (TS)"
        entry: npx eslint --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]
        files: ^sdks/typescript/
        exclude: ^sdks/typescript/src/generated/

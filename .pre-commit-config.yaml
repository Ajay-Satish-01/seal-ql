# Pre-commit hooks for intelligence_connector
# Install: make setup  (or: pre-commit install && pre-commit install --hook-type pre-push)
# Run manually: pre-commit run --all-files
#
# NOTE: The prettier/eslint hooks run locally via npx/pnpm.
#       The pytest hook runs locally via uv on pre-push only (not on every commit).

repos:
  # ============================================================
  # Python — Ruff (formatting + linting)
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: "ruff lint"
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: "ruff format"
        types_or: [python, pyi]

  # ============================================================
  # General file hygiene
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: docker-compose.*\.yml$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # ============================================================
  # TypeScript — Prettier + ESLint (Local via pnpm/npx)
  # ============================================================
  - repo: local
    hooks:
      - id: prettier
        name: "prettier format (TS)"
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, css, json]
        files: ^sdks/typescript/

      - id: eslint
        name: "eslint lint (TS)"
        entry: npx eslint --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]
        files: ^sdks/typescript/

  # ============================================================
  # Tests — pre-push only (Local via uv)
  # ============================================================
  - repo: local
    hooks:
      - id: pytest
        name: "pytest (Python)"
        entry: uv run pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

openapi: 3.1.0
info:
  title: Seal API
  description: AI-powered SQL generation, chat Q&A, and visualization.
  version: 0.1.0
paths:
  /health:
    get:
      summary: Get Health
      description: Liveness check.
      operationId: get_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/databases:
    get:
      summary: List Databases
      description: List registered database identifiers (for clients and the dashboard).
      operationId: list_databases_v1_databases_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabasesListResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/schema:
    get:
      summary: Get Schema
      description: Introspect and return the full database schema.
      operationId: get_schema_v1_schema_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: database_id
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          description: Target database identifier.
          default: default
          title: Database Id
        description: Target database identifier.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseSchema'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/query:
    post:
      summary: Execute Query
      description: Translates natural language to SQL, executes it, and returns chart
        specs.
      operationId: execute_query_v1_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/chat:
    post:
      summary: Chat
      description: Schema-grounded conversational Q&A with optional charts and streaming.
      operationId: chat_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/catalog:
    get:
      summary: Get Catalog
      description: Return the loaded global data catalog.
      operationId: get_catalog_v1_catalog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/catalog/sync:
    post:
      summary: Sync Catalog Route
      description: Re-sync catalog YAML from live database schema.
      operationId: sync_catalog_route_v1_catalog_sync_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSyncResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/catalog/descriptions:
    patch:
      summary: Patch Catalog Descriptions
      description: Persist table/view description overrides to workspace DB (YAML
        may regenerate on sync).
      operationId: patch_catalog_descriptions_v1_catalog_descriptions_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogDescriptionsPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/workspace/settings:
    get:
      summary: Get Workspace Settings
      operationId: get_workspace_settings_v1_workspace_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
    patch:
      summary: Patch Workspace Settings
      operationId: patch_workspace_settings_v1_workspace_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSettingsPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/workspace/settings/apply:
    post:
      summary: Apply Workspace Settings
      description: Apply persisted hot-reload settings to the running API (prod dashboard
        button).
      operationId: apply_workspace_settings_v1_workspace_settings_apply_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/workspace/export:
    get:
      summary: Export Workspace
      operationId: export_workspace_v1_workspace_export_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceExportResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/vector/reindex:
    post:
      summary: Reindex Vector
      operationId: reindex_vector_v1_vector_reindex_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorReindexResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
components:
  schemas:
    CatalogDescriptionItem:
      properties:
        name:
          type: string
          title: Name
        schema:
          type: string
          title: Schema
          default: public
        table_description:
          anyOf:
          - type: string
          - type: 'null'
          title: Table Description
        view_description:
          anyOf:
          - type: string
          - type: 'null'
          title: View Description
      type: object
      required:
      - name
      title: CatalogDescriptionItem
    CatalogDescriptionsPatch:
      properties:
        tables:
          items:
            $ref: '#/components/schemas/CatalogDescriptionItem'
          type: array
          title: Tables
      type: object
      title: CatalogDescriptionsPatch
    CatalogResponse:
      properties:
        version:
          type: integer
          title: Version
        generated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At
        schema_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Schema Hash
        tables:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tables
      type: object
      required:
      - version
      title: CatalogResponse
    CatalogSyncResponse:
      properties:
        added:
          type: integer
          title: Added
        updated:
          type: integer
          title: Updated
        preserved:
          type: integer
          title: Preserved
        removed:
          type: integer
          title: Removed
        path:
          type: string
          title: Path
      type: object
      required:
      - added
      - updated
      - preserved
      - removed
      - path
      title: CatalogSyncResponse
    ChartSpec:
      properties:
        chart_type:
          $ref: '#/components/schemas/ChartType'
        vega_lite_spec:
          additionalProperties: true
          type: object
          title: Vega Lite Spec
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - chart_type
      title: ChartSpec
      description: "The final visualization specification.\n\nAttributes:\n    chart_type:\
        \ The determined type of chart (line, bar, table, etc.).\n    vega_lite_spec:\
        \ A JSON-serializable dictionary containing a valid Vega-Lite v5 spec.\n \
        \       If chart_type is 'table' or 'metric_card', this will be empty (as\
        \ they are\n        rendered natively by the UI, not via Vega-Lite).\n   \
        \ metadata: Additional metadata for rendering (e.g., suggested titles, formatting\
        \ hints)."
    ChartType:
      type: string
      enum:
      - line
      - bar
      - scatter
      - table
      - pie
      - area
      - metric_card
      title: ChartType
      description: Supported chart types for visualization.
    ChatMessageSchema:
      properties:
        role:
          type: string
          title: Role
          description: user or assistant
        content:
          type: string
          maxLength: 8000
          title: Content
          description: Message content.
      type: object
      required:
      - role
      - content
      title: ChatMessageSchema
    ChatRequest:
      properties:
        message:
          type: string
          maxLength: 8000
          title: Message
          description: Latest user message.
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
          description: Conversation session id.
        messages:
          anyOf:
          - items:
              $ref: '#/components/schemas/ChatMessageSchema'
            type: array
          - type: 'null'
          title: Messages
          description: Optional full history override.
        stream:
          type: boolean
          title: Stream
          description: Stream final answer as SSE when true.
          default: false
        include_charts:
          type: boolean
          title: Include Charts
          description: When true, attach Vega-Lite chart if SQL runs.
          default: false
        enhancement:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enhancement
          description: Override CHAT_ENHANCEMENT_ENABLED for this request.
        database_id:
          type: string
          minLength: 1
          title: Database Id
          description: 'Registered database identifier (default: ''default'').'
          default: default
      type: object
      required:
      - message
      title: ChatRequest
    ColumnInfo:
      properties:
        name:
          type: string
          title: Name
          description: Column name
        data_type:
          type: string
          title: Data Type
          description: Raw database type (e.g., 'VARCHAR(100)')
        normalized_type:
          $ref: '#/components/schemas/ColumnType'
          description: Normalized portable type
        nullable:
          type: boolean
          title: Nullable
          description: Whether the column allows NULL values
          default: true
        is_primary_key:
          type: boolean
          title: Is Primary Key
          description: Whether this column is a primary key
          default: false
        default_value:
          anyOf:
          - type: string
          - type: 'null'
          title: Default Value
          description: Default value expression
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Column comment/description
      type: object
      required:
      - name
      - data_type
      - normalized_type
      title: ColumnInfo
      description: Metadata for a single database column.
    ColumnMetadata:
      properties:
        name:
          type: string
          title: Name
        type:
          type: string
          title: Type
          default: str
        nullable:
          type: boolean
          title: Nullable
          default: true
      type: object
      required:
      - name
      title: ColumnMetadata
      description: "Metadata for a single result column.\n\nAttributes:\n    name:\
        \ Column name as returned by the database.\n    type: Python type name (e.g.,\
        \ 'int', 'str', 'datetime').\n    nullable: Whether the column contained any\
        \ NULL values in the result set."
    ColumnType:
      type: string
      enum:
      - string
      - integer
      - float
      - boolean
      - date
      - timestamp
      - numeric
      - json
      - array
      - other
      title: ColumnType
      description: Normalized column types across all supported databases.
    ContinuousAggregateInfo:
      properties:
        source_hypertable:
          type: string
          title: Source Hypertable
          description: The hypertable this aggregate reads from
        view_definition:
          anyOf:
          - type: string
          - type: 'null'
          title: View Definition
          description: The SQL definition of the continuous aggregate
        refresh_interval:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Interval
          description: How often the aggregate refreshes (e.g., '1 hour')
        refresh_start_offset:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Start Offset
          description: Start offset for refresh window
        refresh_end_offset:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh End Offset
          description: End offset for refresh window
      type: object
      required:
      - source_hypertable
      title: ContinuousAggregateInfo
      description: 'TimescaleDB continuous aggregate metadata.


        Continuous aggregates are materialized views that are incrementally updated

        by TimescaleDB in the background. They''re ideal for time-series analytics

        because the LLM can query them directly for pre-aggregated data.'
    DatabaseInfo:
      properties:
        database_id:
          type: string
          title: Database Id
          description: Registered identifier passed as database_id.
        dialect:
          type: string
          title: Dialect
          description: "SQL dialect (postgres, duckdb, \u2026)."
        is_default:
          type: boolean
          title: Is Default
          description: True for the primary DATABASE_URL backend.
      type: object
      required:
      - database_id
      - dialect
      - is_default
      title: DatabaseInfo
      description: One entry in the configured database registry.
    DatabaseSchema:
      properties:
        dialect:
          type: string
          title: Dialect
          description: 'Database dialect: ''postgres'' or ''duckdb'''
        tables:
          items:
            $ref: '#/components/schemas/TableSchema'
          type: array
          title: Tables
          description: All tables/views/matviews
        relationships:
          items:
            $ref: '#/components/schemas/RelationshipInfo'
          type: array
          title: Relationships
          description: Foreign key relationships
        has_timescaledb:
          type: boolean
          title: Has Timescaledb
          description: Whether TimescaleDB extension is available
          default: false
      type: object
      required:
      - dialect
      title: DatabaseSchema
      description: 'Complete schema for an entire database connection.


        This is the top-level model passed to the query planner and SQL validator.

        It contains all tables (including views, matviews, hypertables, continuous

        aggregates), their columns, and relationships.'
    DatabasesListResponse:
      properties:
        databases:
          items:
            $ref: '#/components/schemas/DatabaseInfo'
          type: array
          title: Databases
          description: Sorted list of configured database_id values.
      type: object
      title: DatabasesListResponse
      description: Registered databases available for routing.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
          description: The health status of the API.
      type: object
      required:
      - status
      title: HealthResponse
      description: Health check response.
    HypertableInfo:
      properties:
        time_column:
          type: string
          title: Time Column
          description: The time-partitioning column name
        chunk_interval:
          anyOf:
          - type: string
          - type: 'null'
          title: Chunk Interval
          description: Chunk time interval (e.g., '7 days')
        compression_enabled:
          type: boolean
          title: Compression Enabled
          description: Whether compression is enabled on this hypertable
          default: false
        num_chunks:
          anyOf:
          - type: integer
          - type: 'null'
          title: Num Chunks
          description: Number of chunks
      type: object
      required:
      - time_column
      title: HypertableInfo
      description: "TimescaleDB-specific metadata for a hypertable.\n\nHypertables\
        \ are the core abstraction in TimescaleDB \u2014 they look like\nregular tables\
        \ but are automatically partitioned by time for performance."
    QueryRequest:
      properties:
        query:
          type: string
          maxLength: 4000
          title: Query
          description: The natural language query to translate to SQL and execute.
        database_id:
          type: string
          minLength: 1
          title: Database Id
          description: 'Registered database identifier (default: ''default'').'
          default: default
      type: object
      required:
      - query
      title: QueryRequest
      description: The incoming query request from a user.
    QueryResponse:
      properties:
        sql:
          type: string
          title: Sql
          description: The generated and executed SQL query.
        columns:
          items:
            $ref: '#/components/schemas/ColumnMetadata'
          type: array
          title: Columns
          description: Metadata for the returned columns.
        results:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Results
          description: The query result rows.
        chart:
          anyOf:
          - $ref: '#/components/schemas/ChartSpec'
          - type: 'null'
          description: The Vega-Lite chart specification, if applicable.
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Execution metadata (time, row count, limits, etc.).
      type: object
      required:
      - sql
      - columns
      - results
      title: QueryResponse
      description: The complete response containing SQL, data, and visualization.
    RelationshipInfo:
      properties:
        from_table:
          type: string
          title: From Table
          description: Source table (the one with the FK)
        from_column:
          type: string
          title: From Column
          description: Source column
        to_table:
          type: string
          title: To Table
          description: Referenced table
        to_column:
          type: string
          title: To Column
          description: Referenced column
        constraint_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Constraint Name
          description: FK constraint name
      type: object
      required:
      - from_table
      - from_column
      - to_table
      - to_column
      title: RelationshipInfo
      description: A foreign key relationship between two tables.
    TableKind:
      type: string
      enum:
      - table
      - view
      - materialized_view
      - hypertable
      - continuous_aggregate
      title: TableKind
      description: 'The kind of relation in the database.


        Distinguishing these is critical because:

        - The LLM needs to know what it can query (e.g., matviews are pre-aggregated)

        - Hypertables and continuous aggregates have time-series semantics

        - The validator may need to handle these differently'
    TableSchema:
      properties:
        name:
          type: string
          title: Name
          description: Table name
        schema_name:
          type: string
          title: Schema Name
          description: Schema/namespace
          default: public
        kind:
          $ref: '#/components/schemas/TableKind'
          description: Type of relation
          default: table
        columns:
          items:
            $ref: '#/components/schemas/ColumnInfo'
          type: array
          title: Columns
          description: Columns in the table
        row_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Row Count
          description: Approximate row count (if available)
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Table comment/description
        hypertable_info:
          anyOf:
          - $ref: '#/components/schemas/HypertableInfo'
          - type: 'null'
          description: TimescaleDB hypertable metadata (if applicable)
        continuous_aggregate_info:
          anyOf:
          - $ref: '#/components/schemas/ContinuousAggregateInfo'
          - type: 'null'
          description: TimescaleDB continuous aggregate metadata (if applicable)
      type: object
      required:
      - name
      title: TableSchema
      description: Full schema for a single database table, view, or materialized
        view.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VectorReindexResponse:
      properties:
        status:
          type: string
          title: Status
        indexed_tables:
          type: integer
          title: Indexed Tables
      type: object
      required:
      - status
      - indexed_tables
      title: VectorReindexResponse
    WorkspaceExportResponse:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
        catalog_overrides:
          additionalProperties: true
          type: object
          title: Catalog Overrides
      type: object
      required:
      - settings
      - catalog_overrides
      title: WorkspaceExportResponse
    WorkspaceSettingsPatch:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
      type: object
      required:
      - settings
      title: WorkspaceSettingsPatch
    WorkspaceSettingsResponse:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Schema
        hot_reload_applied:
          items:
            type: string
          type: array
          title: Hot Reload Applied
        pending_apply:
          items:
            type: string
          type: array
          title: Pending Apply
        restart_required:
          items:
            type: string
          type: array
          title: Restart Required
        storage:
          anyOf:
          - $ref: '#/components/schemas/WorkspaceStorageInfo'
          - type: 'null'
      type: object
      required:
      - settings
      title: WorkspaceSettingsResponse
    WorkspaceStorageInfo:
      properties:
        settings_read_source:
          type: string
          title: Settings Read Source
          description: 'Where settings overrides were read: postgres, file, or env
            only.'
          default: env
        catalog_read_source:
          type: string
          title: Catalog Read Source
          description: 'Where catalog overrides were read: postgres, file, or env
            only.'
          default: env
        write_target:
          type: string
          title: Write Target
          description: 'Where dashboard writes persist: postgres or file.'
          default: postgres
      type: object
      title: WorkspaceStorageInfo
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key

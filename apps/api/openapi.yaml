openapi: 3.1.0
info:
  title: Seal API
  description: AI-powered SQL generation, chat Q&A, and visualization.
  version: 0.1.0
paths:
  /health:
    get:
      summary: Get Health
      description: Liveness check.
      operationId: get_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/databases:
    get:
      summary: List Databases
      description: List registered database identifiers (for clients and the dashboard).
      operationId: list_databases_v1_databases_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabasesListResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/schema:
    get:
      summary: Get Schema
      description: Introspect and return the full database schema.
      operationId: get_schema_v1_schema_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: database_id
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          description: Target database identifier.
          default: default
          title: Database Id
        description: Target database identifier.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseSchema'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/query:
    post:
      summary: Execute Query
      description: Translates natural language to SQL, executes it, and returns chart
        specs.
      operationId: execute_query_v1_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '400':
          description: Guardrails rejected the query (out of scope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryOutOfScopeErrorResponse'
              example:
                detail:
                  detail: query_out_of_scope
                  reason: off-topic pattern
                  suggested_queries:
                  - Show order count by month
                  - What tables are available?
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/chat:
    post:
      summary: Chat
      description: Schema-grounded conversational Q&A with optional charts and streaming.
      operationId: chat_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: JSON ChatResponse when stream=false; SSE (seal.meta + answer
            chunks) when stream=true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatStreamMeta'
              description: 'SSE wire format: `event: seal.meta` whose `data:` line
                matches ChatStreamMeta, then OpenAI-style `data:` answer chunks, then
                `data: [DONE]`'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '404':
          description: Unknown database_id
          content:
            application/json:
              example:
                detail: unknown_database_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/chat/sessions:
    get:
      summary: List Chat Sessions
      description: 'List chat sessions with messages (most recent first).


        Sessions are global to the API key (single-tenant ops dashboard).

        Limit is clamped by the store to ``CHAT_SESSION_LIST_MAX_LIMIT``.'
      operationId: list_chat_sessions_v1_chat_sessions_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: database_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by pinned database_id.
          title: Database Id
        description: Filter by pinned database_id.
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: Page size (default from CHAT_SESSION_LIST_DEFAULT_LIMIT).
          title: Limit
        description: Page size (default from CHAT_SESSION_LIST_DEFAULT_LIMIT).
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset.
          default: 0
          title: Offset
        description: Pagination offset.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/chat/sessions/{session_id}:
    get:
      summary: Get Chat Session
      description: Load full message history for a session.
      operationId: get_chat_session_v1_chat_sessions__session_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Chat Session
      description: Delete a chat session and its messages.
      operationId: delete_chat_session_v1_chat_sessions__session_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/catalog:
    get:
      summary: Get Catalog
      description: Return the loaded global data catalog.
      operationId: get_catalog_v1_catalog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/catalog/sync:
    post:
      summary: Sync Catalog Route
      description: Re-sync catalog YAML from live database schema.
      operationId: sync_catalog_route_v1_catalog_sync_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSyncResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/catalog/descriptions:
    patch:
      summary: Patch Catalog Descriptions
      description: Persist table/view description overrides to workspace DB (YAML
        may regenerate on sync).
      operationId: patch_catalog_descriptions_v1_catalog_descriptions_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogDescriptionsPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/workspace/settings:
    get:
      summary: Get Workspace Settings
      operationId: get_workspace_settings_v1_workspace_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
    patch:
      summary: Patch Workspace Settings
      operationId: patch_workspace_settings_v1_workspace_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSettingsPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/workspace/settings/apply:
    post:
      summary: Apply Workspace Settings
      description: Apply persisted hot-reload settings to the running API (prod dashboard
        button).
      operationId: apply_workspace_settings_v1_workspace_settings_apply_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/workspace/export:
    get:
      summary: Export Workspace
      operationId: export_workspace_v1_workspace_export_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceExportResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
  /v1/vector/reindex:
    post:
      summary: Reindex Vector
      operationId: reindex_vector_v1_vector_reindex_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorReindexResponse'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              example:
                detail: Invalid or missing API key
      security:
      - APIKeyHeader: []
components:
  schemas:
    CatalogDescriptionItem:
      properties:
        name:
          type: string
          title: Name
        schema:
          type: string
          title: Schema
          default: public
        table_description:
          anyOf:
          - type: string
          - type: 'null'
          title: Table Description
        view_description:
          anyOf:
          - type: string
          - type: 'null'
          title: View Description
      type: object
      required:
      - name
      title: CatalogDescriptionItem
    CatalogDescriptionsPatch:
      properties:
        tables:
          items:
            $ref: '#/components/schemas/CatalogDescriptionItem'
          type: array
          title: Tables
      type: object
      title: CatalogDescriptionsPatch
    CatalogResponse:
      properties:
        version:
          type: integer
          title: Version
        generated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At
        schema_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Schema Hash
        tables:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tables
      type: object
      required:
      - version
      title: CatalogResponse
    CatalogSyncResponse:
      properties:
        added:
          type: integer
          title: Added
        updated:
          type: integer
          title: Updated
        preserved:
          type: integer
          title: Preserved
        removed:
          type: integer
          title: Removed
        path:
          type: string
          title: Path
      type: object
      required:
      - added
      - updated
      - preserved
      - removed
      - path
      title: CatalogSyncResponse
    ChartSpec:
      properties:
        chart_type:
          $ref: '#/components/schemas/ChartType'
        vega_lite_spec:
          additionalProperties: true
          type: object
          title: Vega Lite Spec
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - chart_type
      title: ChartSpec
      description: "The final visualization specification.\n\nAttributes:\n    chart_type:\
        \ The determined type of chart (line, bar, table, etc.).\n    vega_lite_spec:\
        \ A JSON-serializable dictionary containing a valid Vega-Lite v5 spec.\n \
        \       If chart_type is 'table' or 'metric_card', this will be empty (as\
        \ they are\n        rendered natively by the UI, not via Vega-Lite).\n   \
        \ metadata: Additional metadata for rendering (e.g., suggested titles, formatting\
        \ hints)."
    ChartType:
      type: string
      enum:
      - line
      - bar
      - scatter
      - table
      - pie
      - area
      - metric_card
      title: ChartType
      description: Supported chart types for visualization.
    ChatMessageSchema:
      properties:
        role:
          type: string
          title: Role
          description: user or assistant (system not allowed).
        content:
          type: string
          maxLength: 8000
          title: Content
          description: Message content.
      type: object
      required:
      - role
      - content
      title: ChatMessageSchema
    ChatMetadata:
      properties:
        database_id:
          type: string
          title: Database Id
          default: default
        row_count:
          type: integer
          title: Row Count
          default: 0
        execution_time_ms:
          type: number
          title: Execution Time Ms
          default: 0
        truncated:
          type: boolean
          title: Truncated
          default: false
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        repair_attempts:
          type: integer
          title: Repair Attempts
          default: 0
        used_sql:
          type: boolean
          title: Used Sql
          default: false
        enhancement:
          $ref: '#/components/schemas/EnhancementInfo'
        scope:
          anyOf:
          - $ref: '#/components/schemas/ScopeMetadata'
          - type: 'null'
          description: Guardrails scope decision when classified.
        refusal:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Refusal
          description: True when the turn was refused.
        sql_error:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Sql Error
          description: True when SQL execution failed.
        suggested_queries:
          anyOf:
          - items:
              type: string
            type: array
            maxItems: 3
          - type: 'null'
          title: Suggested Queries
          description: Example in-scope data questions on guardrails refusal.
      type: object
      title: ChatMetadata
      description: Execution + enhancement metadata on /v1/chat JSON responses.
    ChatRequest:
      properties:
        message:
          type: string
          maxLength: 8000
          title: Message
          description: Latest user message.
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
          description: Conversation session id.
        messages:
          anyOf:
          - items:
              $ref: '#/components/schemas/ChatMessageSchema'
            type: array
          - type: 'null'
          title: Messages
          description: Optional full history override.
        stream:
          type: boolean
          title: Stream
          description: Stream final answer as SSE when true.
          default: false
        include_charts:
          type: boolean
          title: Include Charts
          description: When true, attach Vega-Lite chart if SQL runs.
          default: false
        enhancement:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enhancement
          description: Override CHAT_ENHANCEMENT_ENABLED for this request. When true
            but the deployment has no active orchestrator, metadata.enhancement.enabled
            is false and metadata.enhancement.unavailable_reason is orchestrator_unavailable.
        database_id:
          type: string
          minLength: 1
          title: Database Id
          description: 'Registered database identifier (default: ''default'').'
          default: default
      type: object
      required:
      - message
      title: ChatRequest
    ChatResponse:
      properties:
        session_id:
          type: string
          title: Session Id
          description: Session id for follow-up messages.
        message:
          type: string
          title: Message
          description: Assistant natural language answer.
        sources:
          items:
            type: string
          type: array
          title: Sources
          description: Tables used in retrieved context.
        sql:
          anyOf:
          - type: string
          - type: 'null'
          title: Sql
          description: Executed SQL when data was queried.
        results:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Results
          description: Truncated result preview.
        columns:
          anyOf:
          - items:
              $ref: '#/components/schemas/ColumnMetadata'
            type: array
          - type: 'null'
          title: Columns
          description: Column metadata.
        chart:
          anyOf:
          - $ref: '#/components/schemas/ChartSpec'
          - type: 'null'
          description: Chart when include_charts and SQL ran.
        metadata:
          anyOf:
          - $ref: '#/components/schemas/ChatMetadata'
          - additionalProperties: true
            type: object
          title: Metadata
          description: Execution, enhancement, and guardrails metadata.
      type: object
      required:
      - session_id
      - message
      title: ChatResponse
    ColumnInfo:
      properties:
        name:
          type: string
          title: Name
          description: Column name
        data_type:
          type: string
          title: Data Type
          description: Raw database type (e.g., 'VARCHAR(100)')
        normalized_type:
          $ref: '#/components/schemas/ColumnType'
          description: Normalized portable type
        nullable:
          type: boolean
          title: Nullable
          description: Whether the column allows NULL values
          default: true
        is_primary_key:
          type: boolean
          title: Is Primary Key
          description: Whether this column is a primary key
          default: false
        default_value:
          anyOf:
          - type: string
          - type: 'null'
          title: Default Value
          description: Default value expression
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Column comment/description
      type: object
      required:
      - name
      - data_type
      - normalized_type
      title: ColumnInfo
      description: Metadata for a single database column.
    ColumnMetadata:
      properties:
        name:
          type: string
          title: Name
        type:
          type: string
          title: Type
          default: str
        nullable:
          type: boolean
          title: Nullable
          default: true
      type: object
      required:
      - name
      title: ColumnMetadata
      description: "Metadata for a single result column.\n\nAttributes:\n    name:\
        \ Column name as returned by the database.\n    type: Python type name (e.g.,\
        \ 'int', 'str', 'datetime').\n    nullable: Whether the column contained any\
        \ NULL values in the result set."
    ColumnType:
      type: string
      enum:
      - string
      - integer
      - float
      - boolean
      - date
      - timestamp
      - numeric
      - json
      - array
      - other
      title: ColumnType
      description: Normalized column types across all supported databases.
    ContinuousAggregateInfo:
      properties:
        source_hypertable:
          type: string
          title: Source Hypertable
          description: The hypertable this aggregate reads from
        view_definition:
          anyOf:
          - type: string
          - type: 'null'
          title: View Definition
          description: The SQL definition of the continuous aggregate
        refresh_interval:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Interval
          description: How often the aggregate refreshes (e.g., '1 hour')
        refresh_start_offset:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Start Offset
          description: Start offset for refresh window
        refresh_end_offset:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh End Offset
          description: End offset for refresh window
      type: object
      required:
      - source_hypertable
      title: ContinuousAggregateInfo
      description: 'TimescaleDB continuous aggregate metadata.


        Continuous aggregates are materialized views that are incrementally updated

        by TimescaleDB in the background. They''re ideal for time-series analytics

        because the LLM can query them directly for pre-aggregated data.'
    DatabaseInfo:
      properties:
        database_id:
          type: string
          title: Database Id
          description: Registered identifier passed as database_id.
        dialect:
          type: string
          title: Dialect
          description: "SQL dialect (postgres, duckdb, \u2026)."
        is_default:
          type: boolean
          title: Is Default
          description: True for the primary DATABASE_URL backend.
      type: object
      required:
      - database_id
      - dialect
      - is_default
      title: DatabaseInfo
      description: One entry in the configured database registry.
    DatabaseSchema:
      properties:
        dialect:
          type: string
          title: Dialect
          description: 'Database dialect: ''postgres'' or ''duckdb'''
        tables:
          items:
            $ref: '#/components/schemas/TableSchema'
          type: array
          title: Tables
          description: All tables/views/matviews
        relationships:
          items:
            $ref: '#/components/schemas/RelationshipInfo'
          type: array
          title: Relationships
          description: Foreign key relationships
        has_timescaledb:
          type: boolean
          title: Has Timescaledb
          description: Whether TimescaleDB extension is available
          default: false
      type: object
      required:
      - dialect
      title: DatabaseSchema
      description: 'Complete schema for an entire database connection.


        This is the top-level model passed to the query planner and SQL validator.

        It contains all tables (including views, matviews, hypertables, continuous

        aggregates), their columns, and relationships.'
    DatabasesListResponse:
      properties:
        databases:
          items:
            $ref: '#/components/schemas/DatabaseInfo'
          type: array
          title: Databases
          description: Sorted list of configured database_id values.
      type: object
      title: DatabasesListResponse
      description: Registered databases available for routing.
    EnhancementInfo:
      properties:
        enabled:
          type: boolean
          title: Enabled
          default: false
        applied:
          items:
            type: string
          type: array
          title: Applied
        vector_skipped_reason:
          anyOf:
          - type: string
            enum:
            - non_default_database
            - vector_store_disabled
          - type: 'null'
          title: Vector Skipped Reason
        unavailable_reason:
          anyOf:
          - type: string
            const: orchestrator_unavailable
          - type: 'null'
          title: Unavailable Reason
          description: Set when enhancement was requested but the orchestrator is
            not active.
      type: object
      title: EnhancementInfo
      description: Re-exports core ``EnhancementMetadata`` for OpenAPI (see ``pipeline.models``).
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
          description: The health status of the API.
      type: object
      required:
      - status
      title: HealthResponse
      description: Health check response.
    HypertableInfo:
      properties:
        time_column:
          type: string
          title: Time Column
          description: The time-partitioning column name
        chunk_interval:
          anyOf:
          - type: string
          - type: 'null'
          title: Chunk Interval
          description: Chunk time interval (e.g., '7 days')
        compression_enabled:
          type: boolean
          title: Compression Enabled
          description: Whether compression is enabled on this hypertable
          default: false
        num_chunks:
          anyOf:
          - type: integer
          - type: 'null'
          title: Num Chunks
          description: Number of chunks
      type: object
      required:
      - time_column
      title: HypertableInfo
      description: "TimescaleDB-specific metadata for a hypertable.\n\nHypertables\
        \ are the core abstraction in TimescaleDB \u2014 they look like\nregular tables\
        \ but are automatically partitioned by time for performance."
    QueryMetadata:
      properties:
        database_id:
          type: string
          title: Database Id
          default: default
        row_count:
          type: integer
          title: Row Count
          default: 0
        execution_time_ms:
          type: number
          title: Execution Time Ms
          default: 0
        truncated:
          type: boolean
          title: Truncated
          default: false
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        repair_attempts:
          type: integer
          title: Repair Attempts
          default: 0
        used_sql:
          type: boolean
          title: Used Sql
          default: false
      type: object
      title: QueryMetadata
      description: Execution metadata returned on successful /v1/query responses.
    QueryRequest:
      properties:
        query:
          type: string
          maxLength: 4000
          title: Query
          description: The natural language query to translate to SQL and execute.
        database_id:
          type: string
          minLength: 1
          title: Database Id
          description: 'Registered database identifier (default: ''default'').'
          default: default
      type: object
      required:
      - query
      title: QueryRequest
      description: The incoming query request from a user.
    QueryResponse:
      properties:
        sql:
          type: string
          title: Sql
          description: The generated and executed SQL query.
        columns:
          items:
            $ref: '#/components/schemas/ColumnMetadata'
          type: array
          title: Columns
          description: Metadata for the returned columns.
        results:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Results
          description: The query result rows.
        chart:
          anyOf:
          - $ref: '#/components/schemas/ChartSpec'
          - type: 'null'
          description: The Vega-Lite chart specification, if applicable.
        metadata:
          anyOf:
          - $ref: '#/components/schemas/QueryMetadata'
          - additionalProperties: true
            type: object
          title: Metadata
          description: Execution metadata (time, row count, limits, etc.).
      type: object
      required:
      - sql
      - columns
      - results
      title: QueryResponse
      description: The complete response containing SQL, data, and visualization.
    RelationshipInfo:
      properties:
        from_table:
          type: string
          title: From Table
          description: Source table (the one with the FK)
        from_column:
          type: string
          title: From Column
          description: Source column
        to_table:
          type: string
          title: To Table
          description: Referenced table
        to_column:
          type: string
          title: To Column
          description: Referenced column
        constraint_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Constraint Name
          description: FK constraint name
      type: object
      required:
      - from_table
      - from_column
      - to_table
      - to_column
      title: RelationshipInfo
      description: A foreign key relationship between two tables.
    ScopeCategory:
      type: string
      enum:
      - data
      - off_topic
      - abuse
      - ambiguous
      title: ScopeCategory
      description: High-level scope classification bucket.
    ScopeMetadata:
      properties:
        in_scope:
          type: boolean
          title: In Scope
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        source:
          type: string
          enum:
          - heuristic
          - llm
          - limits
          - disabled
          title: Source
        category:
          anyOf:
          - $ref: '#/components/schemas/ScopeCategory'
          - type: 'null'
        confidence:
          anyOf:
          - type: string
            enum:
            - high
            - medium
            - low
          - type: 'null'
          title: Confidence
      type: object
      required:
      - in_scope
      - source
      title: ScopeMetadata
      description: Scope decision embedded in chat metadata and SSE ``seal.meta``.
    SessionDetailResponse:
      properties:
        session_id:
          type: string
          title: Session Id
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        database_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Database Id
        messages:
          items:
            $ref: '#/components/schemas/SessionMessageSchema'
          type: array
          title: Messages
        created_at:
          type: string
          title: Created At
        updated_at:
          type: string
          title: Updated At
      type: object
      required:
      - session_id
      - created_at
      - updated_at
      title: SessionDetailResponse
    SessionListResponse:
      properties:
        sessions:
          items:
            $ref: '#/components/schemas/SessionSummarySchema'
          type: array
          title: Sessions
        has_more:
          type: boolean
          title: Has More
          description: True when more sessions exist beyond this page.
          default: false
      type: object
      title: SessionListResponse
    SessionMessageSchema:
      properties:
        role:
          type: string
          title: Role
        content:
          type: string
          title: Content
        created_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Created At
          description: ISO-8601 when available (postgres).
      type: object
      required:
      - role
      - content
      title: SessionMessageSchema
    SessionSummarySchema:
      properties:
        session_id:
          type: string
          title: Session Id
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        database_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Database Id
        message_count:
          type: integer
          title: Message Count
          default: 0
        created_at:
          type: string
          title: Created At
          description: ISO-8601 timestamp.
        updated_at:
          type: string
          title: Updated At
          description: ISO-8601 timestamp.
      type: object
      required:
      - session_id
      - created_at
      - updated_at
      title: SessionSummarySchema
    TableKind:
      type: string
      enum:
      - table
      - view
      - materialized_view
      - hypertable
      - continuous_aggregate
      title: TableKind
      description: 'The kind of relation in the database.


        Distinguishing these is critical because:

        - The LLM needs to know what it can query (e.g., matviews are pre-aggregated)

        - Hypertables and continuous aggregates have time-series semantics

        - The validator may need to handle these differently'
    TableSchema:
      properties:
        name:
          type: string
          title: Name
          description: Table name
        schema_name:
          type: string
          title: Schema Name
          description: Schema/namespace
          default: public
        kind:
          $ref: '#/components/schemas/TableKind'
          description: Type of relation
          default: table
        columns:
          items:
            $ref: '#/components/schemas/ColumnInfo'
          type: array
          title: Columns
          description: Columns in the table
        row_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Row Count
          description: Approximate row count (if available)
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Table comment/description
        hypertable_info:
          anyOf:
          - $ref: '#/components/schemas/HypertableInfo'
          - type: 'null'
          description: TimescaleDB hypertable metadata (if applicable)
        continuous_aggregate_info:
          anyOf:
          - $ref: '#/components/schemas/ContinuousAggregateInfo'
          - type: 'null'
          description: TimescaleDB continuous aggregate metadata (if applicable)
      type: object
      required:
      - name
      title: TableSchema
      description: Full schema for a single database table, view, or materialized
        view.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VectorReindexResponse:
      properties:
        status:
          type: string
          title: Status
        indexed_tables:
          type: integer
          title: Indexed Tables
      type: object
      required:
      - status
      - indexed_tables
      title: VectorReindexResponse
    WorkspaceExportResponse:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
        catalog_overrides:
          additionalProperties: true
          type: object
          title: Catalog Overrides
      type: object
      required:
      - settings
      - catalog_overrides
      title: WorkspaceExportResponse
    WorkspaceSettingsPatch:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
      type: object
      required:
      - settings
      title: WorkspaceSettingsPatch
    WorkspaceSettingsResponse:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Schema
        hot_reload_applied:
          items:
            type: string
          type: array
          title: Hot Reload Applied
        pending_apply:
          items:
            type: string
          type: array
          title: Pending Apply
        restart_required:
          items:
            type: string
          type: array
          title: Restart Required
        storage:
          anyOf:
          - $ref: '#/components/schemas/WorkspaceStorageInfo'
          - type: 'null'
      type: object
      required:
      - settings
      title: WorkspaceSettingsResponse
    WorkspaceStorageInfo:
      properties:
        settings_read_source:
          type: string
          title: Settings Read Source
          description: 'Where settings overrides were read: postgres, file, or env
            only.'
          default: env
        catalog_read_source:
          type: string
          title: Catalog Read Source
          description: 'Where catalog overrides were read: postgres, file, or env
            only.'
          default: env
        write_target:
          type: string
          title: Write Target
          description: 'Where dashboard writes persist: postgres or file.'
          default: postgres
      type: object
      title: WorkspaceStorageInfo
    ChatStreamMeta:
      description: Flat JSON on the ``data:`` line of the ``seal.meta`` SSE event
        (stream=true).
      properties:
        database_id:
          default: default
          title: Database Id
          type: string
        row_count:
          default: 0
          title: Row Count
          type: integer
        execution_time_ms:
          default: 0
          title: Execution Time Ms
          type: number
        truncated:
          default: false
          title: Truncated
          type: boolean
        warnings:
          items:
            type: string
          title: Warnings
          type: array
        repair_attempts:
          default: 0
          title: Repair Attempts
          type: integer
        used_sql:
          default: false
          title: Used Sql
          type: boolean
        enhancement:
          $ref: '#/components/schemas/EnhancementInfo'
        scope:
          anyOf:
          - $ref: '#/components/schemas/ScopeMetadata'
          - type: 'null'
          default: null
          description: Guardrails scope decision when classified.
        refusal:
          anyOf:
          - type: boolean
          - type: 'null'
          default: null
          description: True when the turn was refused.
          title: Refusal
        sql_error:
          anyOf:
          - type: boolean
          - type: 'null'
          default: null
          description: True when SQL execution failed.
          title: Sql Error
        suggested_queries:
          anyOf:
          - items:
              type: string
            maxItems: 3
            type: array
          - type: 'null'
          default: null
          description: Example in-scope data questions on guardrails refusal.
          title: Suggested Queries
        session_id:
          description: Conversation session id.
          title: Session Id
          type: string
        sources:
          description: Tables used in context.
          items:
            type: string
          title: Sources
          type: array
        sql:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Executed SQL when data was queried.
          title: Sql
        results:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          default: null
          description: Truncated result preview.
          title: Results
        columns:
          anyOf:
          - items:
              $ref: '#/components/schemas/ColumnMetadata'
            type: array
          - type: 'null'
          default: null
          description: Column metadata.
          title: Columns
        chart:
          anyOf:
          - $ref: '#/components/schemas/ChartSpec'
          - type: 'null'
          default: null
          description: Chart when include_charts and SQL ran.
      required:
      - session_id
      title: ChatStreamMeta
      type: object
    QueryOutOfScopeDetail:
      description: Structured HTTP 400 body when guardrails reject ``POST /v1/query``.
      properties:
        detail:
          default: query_out_of_scope
          description: Error code for programmatic clients.
          title: Detail
          type: string
        reason:
          default: ''
          description: Short classification reason.
          title: Reason
          type: string
        suggested_queries:
          description: Up to three example in-scope data questions.
          items:
            type: string
          maxItems: 3
          title: Suggested Queries
          type: array
      title: QueryOutOfScopeDetail
      type: object
    QueryOutOfScopeErrorResponse:
      description: FastAPI error envelope for guardrails rejections on ``POST /v1/query``.
      properties:
        detail:
          $ref: '#/components/schemas/QueryOutOfScopeDetail'
      required:
      - detail
      title: QueryOutOfScopeErrorResponse
      type: object
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key

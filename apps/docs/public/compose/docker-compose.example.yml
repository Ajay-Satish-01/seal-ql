# Seal — image-first stack (no git clone required)
# Usage: docker compose -f docker-compose.example.yml up -d
#
# LLM modes (set in .env beside this file):
#   A) Ollama (default): LLM_MODEL=ollama/llama3.2:1b, LLM_BASE_URL=http://ollama:11434
#   B) Cloud (Gemini/Claude/OpenAI): OLLAMA_PROFILE=disabled, LLM_MODEL=gemini/…,
#      plus LLM_API_KEY or GEMINI_API_KEY / OPENAI_API_KEY / ANTHROPIC_API_KEY / GROQ_API_KEY

services:
  api:
    image: seal/api:latest
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/seal}
      OLLAMA_PROFILE: ${OLLAMA_PROFILE:-default}
      LLM_MODEL: ${LLM_MODEL:-ollama/llama3.2:1b}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAX_ROWS: ${MAX_ROWS:-10000}
      QUERY_TIMEOUT_SECONDS: ${QUERY_TIMEOUT_SECONDS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
      # Required in .env — openssl rand -hex 32 (placeholders rejected at startup)
      SEAL_API_KEY: ${SEAL_API_KEY:?Set SEAL_API_KEY in .env}
      SEAL_DEV_MODE: ${SEAL_DEV_MODE:-false}
      SEAL_DISABLE_DOCS: ${SEAL_DISABLE_DOCS:-true}
      DATA_CATALOG_PATH: ${DATA_CATALOG_PATH:-/app/config/catalog.yaml}
      CATALOG_AUTO_SYNC: ${CATALOG_AUTO_SYNC:-true}
      VECTOR_STORE: ${VECTOR_STORE:-none}
      CHAT_ENHANCEMENT_ENABLED: ${CHAT_ENHANCEMENT_ENABLED:-true}
      SEAL_TRUST_EXPLAINABILITY_ENABLED: ${SEAL_TRUST_EXPLAINABILITY_ENABLED:-false}
      CHROMA_PERSIST_PATH: ${CHROMA_PERSIST_PATH:-/app/data/chroma}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./config:/app/config
      - chroma_data:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '/app/scripts/healthcheck.py']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["${OLLAMA_PROFILE:-default}"]
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      LLM_MODEL: ${LLM_MODEL:-ollama/llama3.2:1b}
    entrypoint: >
      /bin/sh -c "
        /bin/ollama serve &
        sleep 5 &&
        /bin/ollama pull $${LLM_MODEL#ollama/} &&
        wait
      "

volumes:
  postgres_data:
  ollama_data:
  chroma_data:

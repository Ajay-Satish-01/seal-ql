name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================
  # Python: Lint + Format check via Ruff
  # ============================================================
  python-lint:
    name: "Python — Ruff Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: bash scripts/ci-prepare-env.sh

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python workspace (OpenAPI + fixture tests)
        run: uv sync --all-packages --all-extras

      - name: Build API container
        run: docker compose build api

      - name: Ruff lint
        run: docker compose run --rm -T api uv run ruff check .

      - name: Ruff format check
        run: docker compose run --rm -T api uv run ruff format --check .

      - name: Verify OpenAPI docs sync
        run: make verify-openapi-sync

      - name: Validate demo fixtures
        run: uv run pytest tests/test_response_validation.py -v --tb=short

  # ============================================================
  # Web: Docs site build
  # ============================================================
  web-build:
    name: "Web — Next.js Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "apps/web/pnpm-lock.yaml"

      - name: Install and build
        run: make check-web

  # ============================================================
  # Python: Tests via pytest
  # ============================================================
  python-test:
    name: "Python — Tests"
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: bash scripts/ci-prepare-env.sh

      - name: Start services
        run: docker compose up -d --build postgres api
        env:
          LLM_MODEL: "ollama/qwen3.5:4b"
          LLM_BASE_URL: "http://localhost:11434"

      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done

      - name: Run unit tests (excluding E2E)
        run: docker compose exec -T api uv run pytest -v --tb=short --ignore=sdks/python/tests/test_sdk_e2e.py --ignore=apps/api/tests/test_e2e.py --junitxml=/tmp/test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: /tmp/test-results.xml
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ============================================================
  # Python: E2E Tests via pytest
  # ============================================================
  e2e-tests:
    name: "E2E Tests (Python & TypeScript)"
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: bash scripts/ci-prepare-env.sh

      - name: Start services
        run: docker compose up -d --build postgres api ollama
        env:
          # E2E requires a model, we securely inject secrets so it can run cloud models if available.
          # Otherwise it falls back to a small, fast local Ollama model.
          OLLAMA_PROFILE: ${{ secrets.OLLAMA_PROFILE || 'default' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'ollama/qwen3.5:4b' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done

      - name: Run Python E2E tests
        run: docker compose exec -T api uv run pytest -v --tb=short sdks/python/tests/test_sdk_e2e.py apps/api/tests/test_e2e.py --junitxml=/tmp/e2e-test-results.xml

      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: /tmp/e2e-test-results.xml
          retention-days: 7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "sdks/typescript/pnpm-lock.yaml"

      - name: Install TS dependencies
        working-directory: sdks/typescript
        run: pnpm install

      - name: Run TypeScript E2E tests
        working-directory: sdks/typescript
        run: pnpm test

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ============================================================
  # TypeScript: Lint + Format check (when TS SDK exists)
  # ============================================================
  typescript-lint:
    name: "TypeScript — ESLint & Prettier"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "sdks/typescript/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: sdks/typescript
        run: |
          if [ -f package.json ]; then
            pnpm install
          fi

      - name: ESLint
        working-directory: sdks/typescript
        run: |
          if [ -d "src" ]; then
            pnpm exec eslint src/ --max-warnings=0
          else
            echo "Skipping ESLint (src/ directory does not exist yet)"
          fi

      - name: Prettier check
        working-directory: sdks/typescript
        run: |
          if [ -d "src" ]; then
            pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
          else
            echo "Skipping Prettier (src/ directory does not exist yet)"
          fi

  # ============================================================
  # Packages: Verify publishable artifacts build
  # ============================================================
  package-check:
    name: "Packages — SDK & Docker artifacts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: bash scripts/ci-prepare-env.sh

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Python SDK
        run: uv build --package seal

      - name: Validate Python distribution
        run: uv tool run twine check --strict dist/seal-*

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml

      - name: Validate npm package
        working-directory: sdks/typescript
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npm pack --dry-run

      - name: Build production Docker image
        run: docker build --target prod -t seal/api:ci -f apps/api/Dockerfile .

      - name: Verify prod image healthcheck script
        run: docker run --rm seal/api:ci test -f /app/scripts/healthcheck.py

      - name: Verify live healthcheck against running API
        run: |
          docker compose up -d postgres api
          for i in $(seq 1 45); do
            if docker compose exec -T api python /app/scripts/healthcheck.py; then
              echo "Healthcheck passed"
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1
        env:
          SEAL_API_KEY: dev-local-change-me
          SEAL_DEV_MODE: "true"
          LLM_MODEL: ollama/qwen3.5:4b
          LLM_BASE_URL: http://localhost:11434

      - name: Stop compose after healthcheck
        if: always()
        run: docker compose down -v

  # ============================================================
  # Docker: Verify the full stack builds and starts
  # ============================================================
  docker-build:
    name: "Docker — Build & Health Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: bash scripts/ci-prepare-env.sh

      - name: Build all services
        run: docker compose build

      - name: Start stack (without Ollama to save CI resources)
        run: |
          docker compose up -d postgres api
        env:
          LLM_MODEL: "ollama/qwen3.5:4b"
          LLM_BASE_URL: "http://localhost:11434"

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            docker compose logs api
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Stop services
        if: always()
        run: docker compose down -v

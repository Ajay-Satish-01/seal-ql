name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================
  # Python: Lint + Format check via Ruff
  # ============================================================
  python-lint:
    name: "Python — Ruff Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API container
        run: docker compose build api

      - name: Ruff lint
        run: docker compose run --rm -T api uv run ruff check .

      - name: Ruff format check
        run: docker compose run --rm -T api uv run ruff format --check .

  # ============================================================
  # Python: Tests via pytest
  # ============================================================
  python-test:
    name: "Python — Tests"
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build postgres api
        env:
          LLM_MODEL: "ollama/llama3.1"
          LLM_BASE_URL: "http://localhost:11434"

      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done

      - name: Run tests
        run: docker compose exec -T api uv run pytest -v --tb=short --junitxml=/tmp/test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: /tmp/test-results.xml
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ============================================================
  # TypeScript: Lint + Format check (when TS SDK exists)
  # ============================================================
  typescript-lint:
    name: "TypeScript — ESLint & Prettier"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: sdks/typescript
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: ESLint
        working-directory: sdks/typescript
        run: |
          if [ -d "src" ]; then
            npx eslint src/ --max-warnings=0
          else
            echo "Skipping ESLint (src/ directory does not exist yet)"
          fi

      - name: Prettier check
        working-directory: sdks/typescript
        run: |
          if [ -d "src" ]; then
            npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
          else
            echo "Skipping Prettier (src/ directory does not exist yet)"
          fi

  # ============================================================
  # Docker: Verify the full stack builds and starts
  # ============================================================
  docker-build:
    name: "Docker — Build & Health Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Start stack (without Ollama to save CI resources)
        run: |
          docker compose up -d postgres api
        env:
          LLM_MODEL: "ollama/llama3.1"
          LLM_BASE_URL: "http://localhost:11434"

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            docker compose logs api
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Stop services
        if: always()
        run: docker compose down -v
